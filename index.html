<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Transforme Sua Vida Emocional</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#07111f;
  color:#fff;
  overflow-x:hidden;

  display:flex;
  flex-direction:column;

  min-height:100vh;
}

/* FAIXA TOPO */

.topo-alerta{
    position:fixed;
    top:0;
    left:0;

    width:100%;

    background:#d60000;

    color:#fff;

    text-align:center;

    padding:14px;

    font-size:18px;
    font-weight:bold;

    z-index:999;

    animation:piscando 1s infinite;
    box-shadow:0 0 20px rgba(255,0,0,.6);
}

@keyframes piscando{
    0%{opacity:1;}
    50%{opacity:.4;}
    100%{opacity:1;}
}

/* HERO */

.hero{
  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:40px 20px;

  background:
  linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.8)),
  url('https://i.imgur.com/YVdAd0Y.png');

  background-size:cover;
  background-position:center;

  text-align:center;
}

/* CONTEUDO */

.content{
    max-width:950px;
    margin-top:40px;
}

/* TITULO */

h1{
    font-size:72px;
    line-height:1.1;

    margin-bottom:35px;

    text-shadow:0 0 25px rgba(0,0,0,.8);
}

.destaque{
    color:#ffb300;
}

/* BOTAO */

.botao{
    display:inline-block;

    background:linear-gradient(90deg,#00ff22,#00861d);

    color:#fff;

    text-decoration:none;

    padding:22px 55px;

    border-radius:60px;

    font-size:24px;

    font-weight:bold;

    transition:.3s;

    box-shadow:0 0 30px rgba(255,153,0,.5);
}

.botao:hover{
    transform:scale(1.05);
}

/* RODAPE */

footer{
  text-align:center;

  padding:40px 20px;

  color:#999;
  font-size:14px;

  border-top:1px solid rgba(255,255,255,.08);

  background:#07111f;

  position:relative;
  z-index:10;
}

.footer-left{
    margin-bottom:10px;
}

.footer-right a{
    color:#ffb300;
    text-decoration:none;
    margin-left:18px;
    transition:.3s;
}

.footer-right a:hover{
    color:#fff;
}

/* MOBILE */

@media(max-width:768px){

  h1{
    font-size:38px;
  }

  .subtitle{
    font-size:18px;
  }

  .new-price{
    font-size:52px;
  }

  .section-title{
    font-size:32px;
  }

  .hero{
    min-height:auto;
    padding:120px 20px 80px;
  }

}

</style>
</head>

<body>

<!-- ALERTA -->

<div class="topo-alerta">
    ⚠ ATENÇÃO: ÚLTIMAS VAGAS DISPONÍVEIS • OFERTA PODE ENCERRAR A QUALQUER MOMENTO
</div>

<!-- HERO -->

<section class="hero">

    <div class="content">

        <h1>
            Formação Completa em Psicanálise
            <span class="destaque">
                - Torne-se um Profissional
            </span>
         
            

        </h1>

        <a class="botao"
        href="https://go.hotmart.com/Y105736657E"
        target="_blank">

            QUERO PARTICIPAR AGORA

        </a>

    </div>

</section>

<!-- RODAPE -->

<footer>

    <div class="footer-left">
        © 2026 • Todos os direitos reservados
    </div>

    <div class="footer-right">
        <a href="politicadeprivacidade.html">Política de Privacidade</a>
        <a href="osso.html">Termos de Uso</a>
    
    </div>

</footer>

</body>
</html>
